<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios de Logica de Programacao - JS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .section-title {
            margin-top: 30px;
            color: #34495e;
            border-bottom: 2px solid #bdc3c7;
            padding-bottom: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            text-align: left;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <h1>Exercicios de Logica de Programacao</h1>
    <p style="text-align: center;">Clique em qualquer botao para executar o exercicio (lembre-se de tirar o comentario no arquivo script.js para funcionar).</p>

    <h2 class="section-title">Lista de Exercicios 02</h2>
    <div class="grid">
        <button onclick="ex01()">1. Formatacao de Moeda</button>
        <button onclick="ex02()">2. Letras Maiusculas</button>
        <button onclick="ex03()">3. Letras Minusculas</button>
        <button onclick="ex04()">4. Contar Letras Nome</button>
        <button onclick="ex05()">5. Divisao 10/3 (2 casas)</button>
        <button onclick="ex06()">6. Primeiro Nome e Contagem</button>
        <button onclick="ex07()">7. Media de Valores (Moeda)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
